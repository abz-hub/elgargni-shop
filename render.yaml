services:
  - type: web
    name: elgargni-shop
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.10
      # Order/subscription notifications to Telegram (set these in the
      # Render dashboard — see README "Order notifications"). Optional:
      # if unset, the site works normally but sends no notifications.
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
