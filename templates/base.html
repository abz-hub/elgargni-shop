<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ text_dir }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Elgargni Shop{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="page-loader" id="page-loader">
    <span class="page-loader-mark">Elgargni <em>Shop</em></span>
  </div>

  <header class="navbar">
    <div class="container navbar-inner">
      <a class="brand" href="{{ url_for('index') }}">Elgargni <span>Shop</span></a>
      <nav>
        <a href="{{ url_for('index') }}#about">{{ t('nav.about') }}</a>
        <a href="{{ url_for('products') }}">{{ t('nav.products') }}</a>
        <a href="{{ url_for('index') }}#coaching">{{ t('nav.coaching') }}</a>
        <a href="{{ url_for('index') }}#contact">{{ t('nav.contact') }}</a>
        <a href="{{ url_for('cart') }}" class="cart-link">{{ t('nav.cart') }}{% if cart_count %} ({{ cart_count }}){% endif %}</a>
        <a href="{{ url_for('set_language', lang_code='ar' if lang == 'en' else 'en') }}" class="lang-switch">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 2.7 4 6 4 9s-1.5 6.3-4 9c-2.5-2.7-4-6-4-9s1.5-6.3 4-9z"/></svg>
          <span>{{ 'العربية' if lang == 'en' else 'English' }}</span>
        </a>
      </nav>
    </div>
  </header>

  {% block content %}{% endblock %}

  <footer class="footer">
    <div class="container">
      <p>{{ t('footer.copyright') }}</p>
    </div>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
