<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Elgargni Shop{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="navbar">
    <div class="container navbar-inner">
      <a class="brand" href="{{ url_for('index') }}">Elgargni <span>Shop</span></a>
      <nav>
        <a href="{{ url_for('index') }}#about">About</a>
        <a href="{{ url_for('products') }}">Products</a>
        <a href="{{ url_for('index') }}#contact">Contact</a>
      </nav>
    </div>
  </header>

  {% block content %}{% endblock %}

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 Elgargni Shop. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
