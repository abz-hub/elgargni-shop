<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Elgargni Shop{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="page-loader" id="page-loader">
    <span class="page-loader-mark">Elgargni <em>Shop</em></span>
  </div>

  <header class="navbar">
    <div class="container navbar-inner">
      <a class="brand" href="{{ url_for('index') }}">Elgargni <span>Shop</span></a>
      <nav>
        <a href="{{ url_for('index') }}#about">About</a>
        <a href="{{ url_for('products') }}">Products</a>
        <a href="{{ url_for('index') }}#contact">Contact</a>
        <a href="{{ url_for('cart') }}" class="cart-link">Cart{% if cart_count %} ({{ cart_count }}){% endif %}</a>
      </nav>
    </div>
  </header>

  {% block content %}{% endblock %}

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 Elgargni Shop. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
